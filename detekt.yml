build:
  maxIssues: 0
  weights:
    complexity: 2
    LongParameterList: 2
    style: 1

processors:
  active: true
  exclude:
    - "FunctionCountProcessor"
    - "PropertyCountProcessor"

config:
  validation: true

complexity:
  LongParameterList:
    active: true
    functionThreshold: 10
    constructorThreshold: 8
    ignoreDefaultParameters: true
  LongMethod:
    active: true
    threshold: 120

style:
  MagicNumber:
    active: true
    ignoreEnums: true
    ignoreNumbers: ["-1", "0", "1", "2", "42", "1000"]
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludePackageStatements: true
    excludeImportStatements: true
  ReturnCount:
    active: true
    max: 4
    excludeGuardClauses: true
    excludes: ["**/test/**", "**/androidTest/**"]

naming:
  FunctionNaming:
    active: true
    functionPattern: "[a-z][A-Za-z0-9]*"
