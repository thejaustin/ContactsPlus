name: Development Build

on:
  push:
    branches:
      - 'dev/**'
    paths:
      - '**.kt'
      - '**.xml'
      - '**.gradle.kts'
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Create Keystore from Secret (optional)
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Debug APK (Signed if keystore available)
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_FILE: keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew assembleFossDebug --no-daemon

      - name: Build Debug APK (Unsigned fallback)
        if: failure()
        run: ./gradlew assembleFossDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: contacts-plus-dev-build
          path: app/build/outputs/apk/foss/debug/*.apk
